# SecretAi Global Configuration

paths:
  raw_data: "data/raw_data.json"
  refined_kb: "data/refined_kb.json"
  chroma_db: "chroma_db"
  output_models: "models/assistant"
  harvest_seeds: "config/harvest_seeds.yaml"

rag:
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 500
  chunk_overlap: 50
  n_results: 7

training:
  base_model: "unsloth/Llama-3.2-1B-bnb-4bit"
  max_seq_length: 2048
  lora_r: 32
  lora_alpha: 32
  batch_size: 2
  grad_accum_steps: 4
  learning_rate: 0.0002
  max_steps: 5000

assistant:
  temperature: 0.7
  max_new_tokens: 500
