# SecretAi Global Configuration

categories:
  primary: "Backend"
  secondary: "Android"

paths:
  # RAG hierarchical structure
  rag_root: "data/rag"
  rag_domains_root: "data/rag/domains"
  rag_final_kb: "data/rag/final/final_kb.json"
  rag_chroma_db: "data/rag/chroma_db"
  
  # Training related data
  training_datasets_dir: "data/training/datasets"
  training_final_dataset: "data/training/final_dataset.jsonl"
  
  # Model outputs
  output_models: "models/assistant"
  harvest_seeds: "config/harvest_seeds.yaml"

rag:
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 500
  chunk_overlap: 50
  n_results: 7

training:
  base_model: "unsloth/Llama-3.2-3B-bnb-4bit"
  max_seq_length: 2048
  lora_r: 32
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  batch_size: 2
  grad_accum_steps: 4
  learning_rate: 0.0002
  max_steps: 60
  warmup_steps: 5
  weight_decay: 0.01
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"
  seed: 3407

processing:
  min_content_length: 150
  min_code_lines: 10
  noise_patterns:
    - 'Stay organized with collections.*?\.'
    - 'Save and categorize content based on your preferences\.'
    - 'Added in [\d\.]+'
    - 'Artifact: [\w\.\:]+'
    - 'View Source'
    - 'Kotlin \| Java'
    - 'Public functions'
    - 'Parameters <T>.*?\n'
    - 'Throws .*?\n'

prompts:
  assistant:
    system: "You are a senior expert software engineer. Use the context below to answer the user query."
    template: "### System:\n{system_prompt}\n\n### Context:\n{context}\n\n### Instruction:\n{query}\n\n### Response:\n"
  dataset:
    system: "You are a senior expert software engineer specializing in {lang_name}, mobile development (Android), and high-performance backend systems. You always follow SOLID principles and modern best practices."
    template: "### System:\n{system_prompt}\n\n### Instruction:\n{instruction}\n\n### Code:\n{code}\n\n### Response:\n"

harvesting:
  limits:
    primary: 60
    secondary: 30
    default: 20

huggingface:
  domains:
    kotlin:
      - name: "m-a-p/CodeFeedback-Filtered-Instruction"
        limit: 500
        category: "Kotlin"
      - name: "codeparrot/github-code-clean"
        subset: "kotlin"
        split: "train"
        limit: 300
        category: "Kotlin"
    java:
      - name: "m-a-p/CodeFeedback-Filtered-Instruction"
        limit: 500
        category: "Java"
      - name: "codeparrot/github-code-clean"
        subset: "java"
        split: "train"
        limit: 300
        category: "Java"
    python:
      - name: "flytech/python-documentation-v2"
        limit: 500
        category: "Python"
    javascript:
      - name: "codeparrot/github-code-clean"
        subset: "javascript"
        split: "train"
        limit: 300
        category: "Javascript"
